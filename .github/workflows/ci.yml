name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  HUSKY: "0"

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Prefer a reproducible install from the lockfile. npm prunes
      # platform-specific optional transitive deps (e.g. @emnapi/* under sharp's
      # wasm runtime) from a lockfile generated on a different OS, which can make
      # `npm ci` fail its strict sync check on Linux. Fall back to `npm install`
      # so CI self-heals while still preferring the lockfile when it is in sync.
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
